worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limit zones — stored in shared memory per IP.
    limit_req_zone $binary_remote_addr zone=api:10m  rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_status 429;

    server {
        listen 80;

        # Auth endpoints — stricter rate limit, proxy to Go backend.
        location ~ ^/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass         http://127.0.0.1:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # API + admin routes — proxied to Go backend.
        location ~ ^/(api|admin)/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass         http://127.0.0.1:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Everything else — serve the built frontend (SPA fallback to index.html).
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
